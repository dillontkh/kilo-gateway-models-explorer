<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kilo Model Directory</title>

    <!-- React 18 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        kilo: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a' }
                    }
                }
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 20px;
        }

        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #475569;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background-color: #94a3b8;
        }

        .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background-color: #64748b;
        }

        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // --- Icons ---
        const Icons = {
            Server: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01" /></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
            Sun: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
            Moon: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>,
            Filter: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" /></svg>,
            CheckboxChecked: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 text-kilo-500" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd" /></svg>,
            CheckboxUnchecked: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" strokeWidth="2" /></svg>,
            Mic: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" /></svg>,
            Video: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>,
            Image: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
            Text: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>,
            Copy: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" /></svg>,
            Warning: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
        };

        // --- Mock Data ---
        const MOCK_MODELS = [
            { id: "kilo-auto-v1", name: "Kilo Auto router", description: "Automatically routes requests to the most efficient model based on prompt complexity and requirements.", provider_name_from_group: "Kilo AI", context_length: 128000, pricing: { prompt: "0.50", completion: "1.50" }, architecture: { modalities: ["text", "image"] } },
            { id: "minimax-v2", name: "MiniMax Pro", description: "A high efficiency model perfect for rapid, short-context interactions.", provider_name_from_group: "MiniMax", context_length: 32000, pricing: { prompt: "0", completion: "0.20" }, architecture: { modalities: ["text"] } },
            { id: "giga-potato-max", name: "Giga Potato Ultimate", description: "Massive context window suitable for entire document analysis.", provider_name_from_group: "Giga Potato", context_length: 1000000, pricing: { prompt: "5.00", completion: "15.00" }, architecture: { modalities: ["text", "audio"] } },
            { id: "gemini-pro-1.5", name: "Gemini 1.5 Pro", description: "Google's flagship multimodal model with wide context and high accuracy.", provider_name_from_group: "Google", context_length: 2000000, pricing: { prompt: "7.00", completion: "21.00" }, architecture: { modalities: ["text", "image", "audio", "video"] } }
        ];

        // --- Helpers ---
        const formatContextWindow = (ctx) => {
            if (!ctx) return "N/A";
            const num = parseInt(ctx, 10);
            if (num >= 1000000) return (num / 1000000).toFixed(1) + "M";
            if (num >= 1000) return Math.round(num / 1000) + "k";
            return num.toString();
        };

        const getModalityIcon = (mod) => {
            switch (mod.toLowerCase()) {
                case 'audio': return <Icons.Mic />;
                case 'video': return <Icons.Video />;
                case 'image': return <Icons.Image />;
                case 'text': default: return <Icons.Text />;
            }
        };

        // --- Components ---
        const ModelCard = ({ model, expandedId, setExpandedId, handleCopy, copiedId }) => {
            const hasMultipleProviders = model.providers && model.providers.length > 1;
            const isExpanded = expandedId === model.id;
            const [selectedProvider, setSelectedProvider] = useState(model.providers[0]);

            useEffect(() => {
                if (model.providers && !model.providers.includes(selectedProvider)) {
                    setSelectedProvider(model.providers[0]);
                }
            }, [model.providers, selectedProvider]);

            const activeModelData = model.providerData?.[selectedProvider] || model;
            const inPrice = parseFloat(activeModelData.pricing?.prompt || activeModelData.pricing?.input || 0);
            const outPrice = parseFloat(activeModelData.pricing?.completion || activeModelData.pricing?.output || 0);

            return (
                <div
                    onClick={() => setExpandedId(isExpanded ? null : model.id)}
                    className={`group flex flex-col bg-white dark:bg-slate-800 rounded-xl overflow-hidden cursor-pointer transition-all duration-200 ${isExpanded ? 'border-2 border-kilo-500 shadow-md ring-4 ring-kilo-500/10' : 'border border-gray-200 dark:border-slate-700 hover:border-kilo-300 dark:hover:border-kilo-700 hover:shadow-[0_4px_20px_-4px_rgba(20,184,166,0.15)] shadow-sm'}`}
                >
                    {/* Provider Tabs (only shown when expanded and multiple providers) */}
                    {hasMultipleProviders && isExpanded && (
                        <div className="flex px-5 pt-3 gap-4 overflow-x-auto custom-scrollbar border-b border-gray-100 dark:border-slate-750 bg-gray-50/50 dark:bg-slate-800/80">
                            {model.providers.map(p => (
                                <button
                                    key={p}
                                    onClick={(e) => { e.stopPropagation(); setSelectedProvider(p); }}
                                    className={`pb-2 text-xs font-bold whitespace-nowrap border-b-2 transition-colors ${selectedProvider === p ? 'border-kilo-500 text-kilo-600 dark:text-kilo-400' : 'border-transparent text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200'}`}
                                >
                                    {p}
                                </button>
                            ))}
                        </div>
                    )}

                    <div className="p-5 pt-4 flex-1 flex flex-col">
                        {/* Card Header */}
                        <div className="flex justify-between items-start mb-3">
                            <div>
                                <h2 className="text-lg font-bold text-gray-900 dark:text-white leading-tight mb-1 group-hover:text-kilo-600 dark:group-hover:text-kilo-400 transition-colors">
                                    {model.name || model.id}
                                </h2>
                                <div className="text-xs font-mono text-gray-500 dark:text-gray-400 truncate max-w-[200px]">{model.id}</div>
                            </div>
                            {/* Single provider: show name badge. Multiple providers when collapsed: show count badge */}
                            {(!hasMultipleProviders) && (
                                <span className="inline-flex items-center px-2.5 py-0.5 rounded-md text-xs font-medium bg-gray-100 text-gray-800 dark:bg-slate-700 dark:text-gray-200 border border-gray-200 dark:border-slate-600 whitespace-nowrap">
                                    {selectedProvider}
                                </span>
                            )}
                            {hasMultipleProviders && !isExpanded && (
                                <span className="inline-flex items-center px-2.5 py-0.5 rounded-md text-xs font-medium bg-kilo-100 text-kilo-800 dark:bg-kilo-900/30 dark:text-kilo-300 border border-kilo-200 dark:border-kilo-800/50 whitespace-nowrap">
                                    {model.providers.length} providers
                                </span>
                            )}
                        </div>

                        {/* Tags */}
                        <div className="flex flex-wrap gap-1.5 mb-4">
                            {inPrice === 0 && (
                                <span className="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wide bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400 border border-green-200 dark:border-green-800/50">
                                    Free Input
                                </span>
                            )}
                            {(model.architecture?.modalities || []).map(mod => (
                                <span key={mod} className="inline-flex items-center gap-1 px-2 py-0.5 rounded bg-gray-100/80 text-gray-600 dark:bg-slate-700/50 dark:text-gray-300 text-xs border border-gray-200 dark:border-slate-600 capitalize">
                                    {getModalityIcon(mod)} {mod}
                                </span>
                            ))}
                        </div>

                        {/* Description */}
                        <div className={`text-sm text-gray-600 dark:text-gray-400 mb-6 flex-1 ${isExpanded ? '' : 'line-clamp-3'}`}>
                            {model.description || "No description available."}
                        </div>

                        {/* Stats Footer */}
                        <div className="mt-auto grid grid-cols-3 gap-2 p-3 bg-gray-50 dark:bg-slate-800/50 rounded-lg border border-gray-100 dark:border-slate-750">
                            <div className="flex flex-col px-2 border-r border-gray-200 dark:border-slate-700">
                                <span className="text-[10px] text-gray-500 dark:text-gray-500 uppercase tracking-wider mb-0.5 text-center">Context</span>
                                <span className="text-sm font-semibold text-gray-900 dark:text-gray-200 text-center">{formatContextWindow(activeModelData.context_length || model.context_length)}</span>
                            </div>
                            <div className="flex flex-col px-2 border-r border-gray-200 dark:border-slate-700">
                                <span className="text-[10px] text-gray-500 dark:text-gray-500 uppercase tracking-wider mb-0.5 text-center">In / 1M</span>
                                <span className="text-sm font-semibold text-gray-900 dark:text-gray-200 text-center">${inPrice.toFixed(2)}</span>
                            </div>
                            <div className="flex flex-col px-2">
                                <span className="text-[10px] text-gray-500 dark:text-gray-500 uppercase tracking-wider mb-0.5 text-center">Out / 1M</span>
                                <span className="text-sm font-semibold text-gray-900 dark:text-gray-200 text-center">${outPrice.toFixed(2)}</span>
                            </div>
                        </div>
                    </div>

                    {/* Expanded JSON View */}
                    {isExpanded && (
                        <div className="border-t border-gray-200 dark:border-slate-700 bg-gray-900 relative">
                            <div className="absolute top-2 right-2 flex items-center">
                                {copiedId === model.id ? (
                                    <button className="flex items-center gap-1.5 px-3 py-1.5 rounded-md bg-green-500/10 text-green-400 border border-green-500/20 text-xs font-medium cursor-default">
                                        <Icons.Check /> Copied
                                    </button>
                                ) : (
                                    <button
                                        onClick={(e) => handleCopy(e, JSON.stringify(activeModelData, null, 2), model.id)}
                                        className="flex items-center gap-1.5 px-3 py-1.5 rounded-md bg-slate-800 text-gray-300 hover:bg-slate-700 hover:text-white border border-slate-700 transition-colors text-xs font-medium"
                                    >
                                        <Icons.Copy /> Copy JSON
                                    </button>
                                )}
                            </div>
                            <pre className="p-4 pt-12 overflow-x-auto text-[11px] font-mono text-gray-300 custom-scrollbar max-h-96">
                                {JSON.stringify(activeModelData, null, 2)}
                            </pre>
                        </div>
                    )}
                </div>
            );
        };

        // --- Main App ---
        const App = () => {
            const [models, setModels] = useState([]);
            const [loading, setLoading] = useState(true);
            const [fallbackStatus, setFallbackStatus] = useState(false);
            const [darkMode, setDarkMode] = useState(true);

            // Search & Filters
            const [globalSearch, setGlobalSearch] = useState('');
            const [providerSearch, setProviderSearch] = useState('');
            const [selectedProviders, setSelectedProviders] = useState(new Set());
            const [selectedModalities, setSelectedModalities] = useState(new Set());
            const [contextRange, setContextRange] = useState('all');
            const [pricing, setPricing] = useState({ inMin: '', inMax: '', outMin: '', outMax: '' });

            // Sort
            const [sortOption, setSortOption] = useState('name-asc');

            // Expanded / UI State
            const [expandedId, setExpandedId] = useState(null);
            const [copiedId, setCopiedId] = useState(null);

            // Fetch Data
            useEffect(() => {
                const fetchModels = async () => {
                    try {
                        const res = await fetch('https://corsproxy.io/?https://api.kilo.ai/api/gateway/models-by-provider');
                        if (!res.ok) throw new Error('API request failed');
                        const data = await res.json();

                        let flatData = [];
                        if (data.providers && Array.isArray(data.providers)) {
                            const modelMap = new Map();
                            const extractPricing = (m) => {
                                const raw = m.endpoint?.pricing || m.pricing || {};
                                const promptVal = parseFloat(raw.prompt || raw.input || 0);
                                const completionVal = parseFloat(raw.completion || raw.output || 0);
                                // If values look like per-token (very small), convert to per-1M
                                const needsConversion = (promptVal > 0 && promptVal < 0.01) || (completionVal > 0 && completionVal < 0.01);
                                const multiplier = needsConversion ? 1000000 : 1;
                                return {
                                    prompt: String(promptVal * multiplier),
                                    completion: String(completionVal * multiplier)
                                };
                            };
                            data.providers.forEach(p => {
                                (p.models || []).forEach(m => {
                                    const uid = m.slug || m.name || m.id;
                                    const enrichedModel = { ...m, pricing: extractPricing(m) };
                                    if (!modelMap.has(uid)) {
                                        modelMap.set(uid, { ...enrichedModel, id: uid, providerData: { [p.name]: enrichedModel }, providers: [p.name] });
                                    } else {
                                        const existing = modelMap.get(uid);
                                        existing.providerData[p.name] = enrichedModel;
                                        if (!existing.providers.includes(p.name)) {
                                            existing.providers.push(p.name);
                                            existing.providers.sort();
                                        }
                                    }
                                });
                            });
                            flatData = Array.from(modelMap.values());
                        } else if (Array.isArray(data)) {
                            flatData = data.map(m => {
                                const uid = m.slug || m.name || m.id;
                                return { ...m, id: uid, providerData: { [m.provider || 'Unknown']: m }, providers: [m.provider || 'Unknown'] };
                            });
                        } else if (data.data && Array.isArray(data.data)) {
                            flatData = data.data.map(m => {
                                const uid = m.slug || m.name || m.id;
                                return { ...m, id: uid, providerData: { [m.provider || 'Unknown']: m }, providers: [m.provider || 'Unknown'] };
                            });
                        } else {
                            throw new Error('Unrecognized data format');
                        }

                        setModels(flatData.length ? flatData : MOCK_MODELS.map(m => {
                            const uid = m.slug || m.name || m.id;
                            return { ...m, id: uid, providerData: { [m.provider_name_from_group]: m }, providers: [m.provider_name_from_group] };
                        }));
                        if (!flatData.length) setFallbackStatus(true);
                    } catch (err) {
                        console.error("Fetch failed:", err);
                        setModels(MOCK_MODELS.map(m => {
                            const uid = m.slug || m.name || m.id;
                            return { ...m, id: uid, providerData: { [m.provider_name_from_group]: m }, providers: [m.provider_name_from_group] };
                        }));
                        setFallbackStatus(true);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchModels();
            }, []);

            // Theme toggle
            useEffect(() => {
                if (darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [darkMode]);

            // Derived Data
            const allProviders = useMemo(() => {
                const p = new Set(models.flatMap(m => m.providers || [m.provider_name_from_group || m.provider || 'Unknown']));
                return Array.from(p).sort();
            }, [models]);

            // Models filtered by everything EXCEPT provider selection (used to derive visible providers)
            const searchFilteredModels = useMemo(() => {
                let result = models;

                if (globalSearch) {
                    const q = globalSearch.toLowerCase();
                    result = result.filter(m =>
                        (m.name || '').toLowerCase().includes(q) ||
                        (m.id || '').toLowerCase().includes(q) ||
                        (m.description || '').toLowerCase().includes(q) ||
                        (m.providers || []).join(' ').toLowerCase().includes(q)
                    );
                }

                if (selectedModalities.size > 0) {
                    result = result.filter(m => {
                        const mMods = (m.architecture?.modalities || []).map(x => x.toLowerCase());
                        return Array.from(selectedModalities).every(mod => mMods.includes(mod));
                    });
                }

                if (contextRange !== 'all') {
                    result = result.filter(m => {
                        return m.providers.some(p => {
                            const pm = m.providerData?.[p] || m;
                            const ctx = parseInt(pm.context_length || 0, 10);
                            if (contextRange === '<32k') return ctx < 32000;
                            if (contextRange === '32k-128k') return ctx >= 32000 && ctx <= 128000;
                            if (contextRange === '128k-256k') return ctx > 128000 && ctx <= 256000;
                            if (contextRange === '>256k') return ctx > 256000;
                            return true;
                        });
                    });
                }

                result = result.filter(m => {
                    const providerPrices = m.providers.map(p => {
                        const pm = m.providerData?.[p] || m;
                        return {
                            in: parseFloat(pm.pricing?.prompt || pm.pricing?.input || 0),
                            out: parseFloat(pm.pricing?.completion || pm.pricing?.output || 0)
                        };
                    });
                    return providerPrices.some(prices => {
                        if (pricing.inMin && prices.in < parseFloat(pricing.inMin)) return false;
                        if (pricing.inMax && prices.in > parseFloat(pricing.inMax)) return false;
                        if (pricing.outMin && prices.out < parseFloat(pricing.outMin)) return false;
                        if (pricing.outMax && prices.out > parseFloat(pricing.outMax)) return false;
                        return true;
                    });
                });

                return result;
            }, [models, globalSearch, selectedModalities, contextRange, pricing]);

            // Providers visible in sidebar — only those present in search-filtered results
            const visibleProviders = useMemo(() => {
                const p = new Set(searchFilteredModels.flatMap(m => m.providers || [m.provider_name_from_group || m.provider || 'Unknown']));
                return Array.from(p).sort();
            }, [searchFilteredModels]);

            const allModalities = useMemo(() => {
                const m = new Set();
                models.forEach(model => {
                    if (model.architecture?.modalities) {
                        model.architecture.modalities.forEach(mod => m.add(mod.toLowerCase()));
                    }
                });
                return Array.from(m).sort();
            }, [models]);

            const filteredAndSortedModels = useMemo(() => {
                let result = models;

                // Global Search
                if (globalSearch) {
                    const q = globalSearch.toLowerCase();
                    result = result.filter(m =>
                        (m.name || '').toLowerCase().includes(q) ||
                        (m.id || '').toLowerCase().includes(q) ||
                        (m.description || '').toLowerCase().includes(q) ||
                        (m.providers || []).join(' ').toLowerCase().includes(q)
                    );
                }

                // Provider filter
                if (selectedProviders.size > 0) {
                    result = result.filter(m => {
                        const mProvs = m.providers || [m.provider_name_from_group || m.provider || 'Unknown'];
                        return mProvs.some(p => selectedProviders.has(p));
                    });
                }

                // Modalities filter
                if (selectedModalities.size > 0) {
                    result = result.filter(m => {
                        const mMods = (m.architecture?.modalities || []).map(x => x.toLowerCase());
                        return Array.from(selectedModalities).every(mod => mMods.includes(mod));
                    });
                }

                // Context Filter
                if (contextRange !== 'all') {
                    result = result.filter(m => {
                        return m.providers.some(p => {
                            const pm = m.providerData?.[p] || m;
                            const ctx = parseInt(pm.context_length || 0, 10);
                            if (contextRange === '<32k') return ctx < 32000;
                            if (contextRange === '32k-128k') return ctx >= 32000 && ctx <= 128000;
                            if (contextRange === '128k-256k') return ctx > 128000 && ctx <= 256000;
                            if (contextRange === '>256k') return ctx > 256000;
                            return true;
                        });
                    });
                }

                // Pricing Filter
                result = result.filter(m => {
                    const providerPrices = m.providers.map(p => {
                        const pm = m.providerData?.[p] || m;
                        return {
                            in: parseFloat(pm.pricing?.prompt || pm.pricing?.input || 0),
                            out: parseFloat(pm.pricing?.completion || pm.pricing?.output || 0)
                        };
                    });

                    return providerPrices.some(prices => {
                        if (pricing.inMin && prices.in < parseFloat(pricing.inMin)) return false;
                        if (pricing.inMax && prices.in > parseFloat(pricing.inMax)) return false;
                        if (pricing.outMin && prices.out < parseFloat(pricing.outMin)) return false;
                        if (pricing.outMax && prices.out > parseFloat(pricing.outMax)) return false;
                        return true;
                    });
                });

                // Sorting
                result.sort((a, b) => {
                    const nameA = a.name || ''; const nameB = b.name || '';
                    const provA = (a.providers || [])[0] || a.provider_name_from_group || ''; const provB = (b.providers || [])[0] || b.provider_name_from_group || '';

                    const getMinPrice = (m) => Math.min(...(m.providers.length ? m.providers : ['']).map(p => {
                        const pm = m.providerData?.[p] || m;
                        return parseFloat(pm.pricing?.prompt || pm.pricing?.input || 0) + parseFloat(pm.pricing?.completion || pm.pricing?.output || 0);
                    }));
                    const getMaxCtx = (m) => Math.max(...(m.providers.length ? m.providers : ['']).map(p => {
                        const pm = m.providerData?.[p] || m;
                        return parseInt(pm.context_length || 0, 10);
                    }));

                    const ctxA = getMaxCtx(a); const ctxB = getMaxCtx(b);
                    const prA = getMinPrice(a); const prB = getMinPrice(b);

                    switch (sortOption) {
                        case 'name-asc': return nameA.localeCompare(nameB);
                        case 'name-desc': return nameB.localeCompare(nameA);
                        case 'prov-asc': return provA.localeCompare(provB);
                        case 'prov-desc': return provB.localeCompare(provA);
                        case 'ctx-desc': return ctxB - ctxA;
                        case 'ctx-asc': return ctxA - ctxB;
                        case 'price-desc': return prB - prA;
                        case 'price-asc': return prA - prB;
                        default: return 0;
                    }
                });

                return result;
            }, [models, globalSearch, selectedProviders, selectedModalities, contextRange, pricing, sortOption]);

            // Handlers
            const toggleProvider = (p) => {
                const next = new Set(selectedProviders);
                next.has(p) ? next.delete(p) : next.add(p);
                setSelectedProviders(next);
            };

            const toggleModality = (m) => {
                const next = new Set(selectedModalities);
                next.has(m) ? next.delete(m) : next.add(m);
                setSelectedModalities(next);
            };

            const handleCopy = (e, text, id) => {
                e.stopPropagation();

                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";  // Avoid scrolling to bottom
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopiedId(id);
                    setTimeout(() => setCopiedId(null), 2000);
                } catch (err) {
                    console.error('Copy failed', err);
                }
                document.body.removeChild(textArea);
            };

            return (
                <div className="flex flex-col h-screen overflow-hidden">
                    {/* Header */}
                    <header className="flex-shrink-0 border-b border-gray-200 dark:border-slate-800 bg-white dark:bg-slate-900 z-10">
                        <div className="px-4 py-3 flex items-center justify-between gap-4">
                            <div className="flex items-center gap-2 text-kilo-600 dark:text-kilo-500 flex-shrink-0">
                                <Icons.Server />
                                <h1 className="text-xl font-bold hidden sm:block">Kilo Directory</h1>
                            </div>

                            <div className="flex-1 max-w-2xl relative">
                                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                    <Icons.Search />
                                </div>
                                <input
                                    type="text"
                                    className="block w-full pl-10 pr-3 py-2 border border-gray-300 dark:border-slate-700 rounded-lg bg-gray-50 dark:bg-slate-800 focus:ring-kilo-500 focus:border-kilo-500 sm:text-sm text-gray-900 dark:text-white transition-colors placeholder-gray-500 dark:placeholder-gray-400"
                                    placeholder="Search models, providers, IDs..."
                                    value={globalSearch}
                                    onChange={(e) => setGlobalSearch(e.target.value)}
                                />
                            </div>

                            <button
                                onClick={() => setDarkMode(!darkMode)}
                                className="p-2 rounded-lg text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-slate-800 transition-colors"
                            >
                                {darkMode ? <Icons.Sun /> : <Icons.Moon />}
                            </button>
                        </div>
                        {fallbackStatus && (
                            <div className="bg-amber-100 dark:bg-amber-900/30 text-amber-800 dark:text-amber-300 px-4 py-2 text-sm flex items-center gap-2 justify-center">
                                <Icons.Warning />
                                <span>API unavailable, showing fallback data.</span>
                            </div>
                        )}
                    </header>

                    {/* Main Workspace */}
                    <div className="flex flex-1 overflow-hidden">

                        {/* Sidebar Filters */}
                        <aside className="w-64 flex-shrink-0 border-r border-gray-200 dark:border-slate-800 bg-white dark:bg-slate-900 overflow-y-auto custom-scrollbar hidden md:block pb-10">
                            <div className="p-4 space-y-8">

                                {/* Providers Filter */}
                                <div>
                                    <div className="flex items-center justify-between mb-3">
                                        <h3 className="text-sm font-semibold text-gray-900 dark:text-white uppercase tracking-wider">Providers</h3>
                                        {selectedProviders.size > 0 && (
                                            <button onClick={() => setSelectedProviders(new Set())} className="text-xs text-kilo-600 dark:text-kilo-400 hover:underline">Clear All</button>
                                        )}
                                    </div>
                                    <input
                                        type="text"
                                        placeholder="Filter providers..."
                                        className="w-full px-2 py-1 mb-3 text-sm border border-gray-300 dark:border-slate-700 rounded bg-transparent focus:ring-1 focus:ring-kilo-500"
                                        value={providerSearch}
                                        onChange={e => setProviderSearch(e.target.value)}
                                    />
                                    <div className="space-y-2 max-h-48 overflow-y-auto custom-scrollbar">
                                        {visibleProviders.filter(p => p.toLowerCase().includes(providerSearch.toLowerCase())).map(prov => (
                                            <label key={prov} className="flex items-center gap-2 cursor-pointer group" onClick={() => toggleProvider(prov)}>
                                                <div className="flex-shrink-0">
                                                    {selectedProviders.has(prov) ? <Icons.CheckboxChecked /> : <Icons.CheckboxUnchecked />}
                                                </div>
                                                <span className="text-sm text-gray-700 dark:text-gray-300 group-hover:text-kilo-600 dark:group-hover:text-kilo-400 select-none">{prov}</span>
                                            </label>
                                        ))}
                                    </div>
                                </div>

                                {/* Modalities Filter */}
                                {allModalities.length > 0 && (
                                    <div>
                                        <h3 className="text-sm font-semibold text-gray-900 dark:text-white uppercase tracking-wider mb-3">Input Modalities</h3>
                                        <div className="flex flex-wrap gap-2">
                                            {allModalities.map(mod => {
                                                const sel = selectedModalities.has(mod);
                                                return (
                                                    <button
                                                        key={mod}
                                                        onClick={() => toggleModality(mod)}
                                                        className={`px-3 py-1.5 rounded-full text-xs font-medium flex items-center gap-1.5 transition-colors ${sel ? 'bg-kilo-100 text-kilo-800 dark:bg-kilo-900/40 dark:text-kilo-300 ring-1 ring-kilo-500' : 'bg-gray-100 text-gray-600 dark:bg-slate-800 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-slate-700'}`}
                                                    >
                                                        {getModalityIcon(mod)}
                                                        <span className="capitalize">{mod}</span>
                                                    </button>
                                                )
                                            })}
                                        </div>
                                    </div>
                                )}

                                {/* Context Window */}
                                <div>
                                    <h3 className="text-sm font-semibold text-gray-900 dark:text-white uppercase tracking-wider mb-3">Context Window</h3>
                                    <div className="space-y-2">
                                        {['all', '<32k', '32k-128k', '128k-256k', '>256k'].map(range => (
                                            <label key={range} className="flex items-center gap-2 cursor-pointer">
                                                <input
                                                    type="radio"
                                                    name="context"
                                                    value={range}
                                                    checked={contextRange === range}
                                                    onChange={(e) => setContextRange(e.target.value)}
                                                    className="text-kilo-500 focus:ring-kilo-500 bg-gray-100 border-gray-300 dark:bg-slate-800 dark:border-slate-600"
                                                />
                                                <span className="text-sm text-gray-700 dark:text-gray-300 capitalize">{range.replace(/</g, 'Less than ').replace(/>/g, 'Greater than ')}</span>
                                            </label>
                                        ))}
                                    </div>
                                </div>

                                {/* Pricing Filter */}
                                <div>
                                    <h3 className="text-sm font-semibold text-gray-900 dark:text-white uppercase tracking-wider mb-3">Pricing (/ 1M tokens)</h3>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="text-xs text-gray-500 dark:text-gray-400 mb-1 block">Input Price</label>
                                            <div className="flex gap-2">
                                                <input type="number" placeholder="Min" value={pricing.inMin} onChange={e => setPricing({ ...pricing, inMin: e.target.value })} className="w-full px-2 py-1 text-sm bg-transparent border border-gray-300 dark:border-slate-700 rounded focus:ring-1 focus:ring-kilo-500" />
                                                <input type="number" placeholder="Max" value={pricing.inMax} onChange={e => setPricing({ ...pricing, inMax: e.target.value })} className="w-full px-2 py-1 text-sm bg-transparent border border-gray-300 dark:border-slate-700 rounded focus:ring-1 focus:ring-kilo-500" />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-xs text-gray-500 dark:text-gray-400 mb-1 block">Output Price</label>
                                            <div className="flex gap-2">
                                                <input type="number" placeholder="Min" value={pricing.outMin} onChange={e => setPricing({ ...pricing, outMin: e.target.value })} className="w-full px-2 py-1 text-sm bg-transparent border border-gray-300 dark:border-slate-700 rounded focus:ring-1 focus:ring-kilo-500" />
                                                <input type="number" placeholder="Max" value={pricing.outMax} onChange={e => setPricing({ ...pricing, outMax: e.target.value })} className="w-full px-2 py-1 text-sm bg-transparent border border-gray-300 dark:border-slate-700 rounded focus:ring-1 focus:ring-kilo-500" />
                                            </div>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </aside>

                        {/* Results Area */}
                        <main className="flex-1 overflow-y-auto custom-scrollbar p-4 md:p-6 lg:p-8 relative">
                            {loading ? (
                                <div className="flex items-center justify-center h-full">
                                    <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-kilo-500"></div>
                                </div>
                            ) : (
                                <>
                                    {/* Top Bar */}
                                    <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                                        <div className="text-sm text-gray-600 dark:text-gray-400 bg-white dark:bg-slate-800 px-3 py-1.5 rounded-md border border-gray-200 dark:border-slate-700 shadow-sm inline-flex items-center gap-2">
                                            <Icons.Server />
                                            <span className="font-semibold text-gray-900 dark:text-white">{filteredAndSortedModels.length}</span> models found
                                        </div>

                                        <div className="flex items-center gap-2">
                                            <Icons.Filter />
                                            <select
                                                value={sortOption}
                                                onChange={e => setSortOption(e.target.value)}
                                                className="bg-white dark:bg-slate-800 border border-gray-300 dark:border-slate-700 text-gray-900 dark:text-gray-100 text-sm rounded-lg focus:ring-kilo-500 focus:border-kilo-500 block w-full p-2 outline-none cursor-pointer"
                                            >
                                                <option value="name-asc">Name (A-Z)</option>
                                                <option value="name-desc">Name (Z-A)</option>
                                                <option value="prov-asc">Provider (A-Z)</option>
                                                <option value="prov-desc">Provider (Z-A)</option>
                                                <option value="ctx-desc">Context (High to Low)</option>
                                                <option value="ctx-asc">Context (Low to High)</option>
                                                <option value="price-asc">Price (Low to High)</option>
                                                <option value="price-desc">Price (High to Low)</option>
                                            </select>
                                        </div>
                                    </div>

                                    {/* Grid */}
                                    <div className="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6 pb-12 items-start">
                                        {filteredAndSortedModels.map(model => (
                                            <ModelCard
                                                key={model.id}
                                                model={model}
                                                expandedId={expandedId}
                                                setExpandedId={setExpandedId}
                                                handleCopy={handleCopy}
                                                copiedId={copiedId}
                                            />
                                        ))}
                                    </div>

                                    {filteredAndSortedModels.length === 0 && (
                                        <div className="text-center py-20">
                                            <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gray-100 dark:bg-slate-800 text-gray-400 mb-4">
                                                <Icons.Search />
                                            </div>
                                            <h3 className="text-lg font-medium text-gray-900 dark:text-white mb-2">No models found</h3>
                                            <p className="text-gray-500 dark:text-gray-400">Try adjusting your filters or search query.</p>
                                        </div>
                                    )}
                                </>
                            )}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
